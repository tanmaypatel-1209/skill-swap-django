<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skill Swap Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: #f3f4f6;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .background {
            width: 430px;
            height: 520px;
            position: absolute;
            transform: translate(-50%, -50%);
            left: 50%;
            top: 50%;
        }

        .shape {
            height: 200px;
            width: 200px;
            position: absolute;
            border-radius: 50%;
        }

        .shape:first-child {
            background: linear-gradient(#1845ad, #23a2f6);
            left: -80px;
            top: -80px;
            opacity: 0.8;
        }

        .shape:last-child {
            background: linear-gradient(to right, #ff512f, #f09819);
            right: -30px;
            bottom: -80px;
            opacity: 0.8;
        }

        form {
            min-height: 480px;
            height: auto;
            width: 400px;
            background-color: rgba(255, 255, 255, 0.7);
            position: absolute;
            transform: translate(-50%, -50%);
            top: 50%;
            left: 50%;
            border-radius: 10px;
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            padding: 50px 35px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        form * {
            color: #1e1e1e;
            letter-spacing: 0.5px;
            outline: none;
            border: none;
        }

        form h3 {
            font-size: 32px;
            font-weight: 600;
            line-height: 42px;
            text-align: center;
            margin-bottom: 30px;
            color: #333;
        }

        label {
            display: block;
            margin-top: 20px;
            font-size: 16px;
            font-weight: 500;
            color: #555;
        }

        .input-group {
            position: relative;
        }

        input {
            display: block;
            height: 50px;
            width: 100%;
            background-color: rgba(0, 0, 0, 0.05);
            border-radius: 3px;
            padding: 0 10px;
            margin-top: 8px;
            font-size: 14px;
            font-weight: 300;
            transition: 0.3s;
            color: #333;
        }

        input:focus {
            background-color: rgba(255, 255, 255, 0.9);
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            border: 1px solid #ccc;
        }

        input.error {
            border: 1px solid red;
            background-color: rgba(255, 0, 0, 0.05);
        }

        .password-toggle {
            position: absolute;
            right: 15px;
            top: 22px;
            cursor: pointer;
            color: #666;
            transition: color 0.3s;
        }
        
        .password-toggle:hover {
            color: #000;
        }

        button {
            margin-top: 30px;
            width: 100%;
            background: linear-gradient(to right, #23a2f6, #1845ad);
            color: #ffffff;
            padding: 15px 0;
            font-size: 18px;
            font-weight: 600;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s ease;
            box-shadow: 0 4px 15px rgba(35, 162, 246, 0.3);
        }

        button:hover {
            transform: scale(1.02);
            box-shadow: 0 6px 20px rgba(35, 162, 246, 0.5);
        }

        .bottom-links {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
            font-size: 14px;
            padding-bottom: 10px;
        }

        .bottom-links a {
            text-decoration: none;
            color: #666;
            transition: 0.3s;
        }

        .bottom-links a:hover {
            color: #1845ad;
            text-decoration: underline;
        }

        .error-text {
            color: red;
            font-size: 12px;
            margin-top: 5px;
            display: none;
        }
    </style>
</head>
<body>

    <div class="background">
        <div class="shape"></div>
        <div class="shape"></div>
    </div>

    <form id="loginForm" method="POST">
        {% csrf_token %}
        
        <h3>Skill Swap</h3>

        <label for="email">Email</label>
        <input type="text" placeholder="Enter your email" id="email" name="email" oninput="this.value = this.value.toLowerCase()">
        <p class="error-text" id="emailError">Email must be a valid @gmail.com address</p>

        <label for="password">Password</label>
        <div class="input-group">
            <input type="password" placeholder="8-15 Characters" id="password" name="password" maxlength="15">
            <i class="fas fa-eye password-toggle" id="togglePassword"></i>
        </div>
        <p class="error-text" id="passError">Password must be 8-15 characters</p>

        {% if messages %}
            {% for message in messages %}
                <p class="error-text" style="display: block; text-align: center; margin-top: 10px; font-size: 13px;">
                    {{ message }}
                </p>
            {% endfor %}
        {% endif %}

        <button type="button" onclick="validateAndLogin()">Log In</button>

        <div class="bottom-links">
            <a href="auth/forgot/">Forgot Password?</a>
            <a href="/sign/">Create Account</a>
        </div>
    </form>

    <script>
        const togglePassword = document.querySelector('#togglePassword');
        const passwordInput = document.querySelector('#password');

        togglePassword.addEventListener('click', function (e) {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            this.classList.toggle('fa-eye-slash');
        });

        function validateAndLogin() {
            const email = document.getElementById('email');
            const password = document.getElementById('password');
            const emailError = document.getElementById('emailError');
            const passError = document.getElementById('passError');
            
            let isValid = true;

            if (!email.value.includes('@gmail.com') || email.value.trim() === "") {
                email.classList.add('error');
                emailError.style.display = 'block';
                isValid = false;
            } else {
                email.classList.remove('error');
                emailError.style.display = 'none';
            }

            if (password.value.length < 8 || password.value.length > 15) {
                password.classList.add('error');
                passError.style.display = 'block';
                isValid = false;
            } else {
                password.classList.remove('error');
                passError.style.display = 'none';
            }

            if (isValid) {
                document.getElementById('loginForm').submit();
            }
        }
    </script>
</body>
</html>
