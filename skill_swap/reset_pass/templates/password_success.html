<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Success!</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <style>
        /* Same Glassmorphism Style */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .background { width: 430px; height: 520px; position: absolute; transform: translate(-50%, -50%); left: 50%; top: 50%; }
        .shape { height: 200px; width: 200px; position: absolute; border-radius: 50%; }
        .shape:first-child { background: linear-gradient(#1845ad, #23a2f6); left: -80px; top: -80px; opacity: 0.8; }
        .shape:last-child { background: linear-gradient(to right, #ff512f, #f09819); right: -30px; bottom: -80px; opacity: 0.8; }
        
        .card { 
            height: 400px; width: 400px; 
            background-color: rgba(255, 255, 255, 0.7); 
            position: absolute; transform: translate(-50%, -50%); top: 50%; left: 50%; 
            border-radius: 10px; backdrop-filter: blur(15px); 
            border: 1px solid rgba(255, 255, 255, 0.5); 
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1); 
            padding: 40px 30px; 
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .icon-circle {
            height: 80px; width: 80px;
            background: linear-gradient(to right, #56ab2f, #a8e063); /* Green Gradient */
            border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(86, 171, 47, 0.3);
        }

        .icon-circle i { font-size: 40px; color: white; }

        h3 { font-size: 24px; font-weight: 600; color: #333; margin-bottom: 10px; }
        p { font-size: 14px; color: #666; margin-bottom: 30px; }

        a.btn { 
            text-decoration: none;
            display: block;
            width: 100%; 
            background: linear-gradient(to right, #23a2f6, #1845ad); 
            color: #ffffff; padding: 15px 0; 
            font-size: 16px; font-weight: 600; 
            border-radius: 5px; 
            transition: 0.3s;
        }
        a.btn:hover { transform: scale(1.02); }
    </style>
</head>
<body>
    <div class="background">
        <div class="shape"></div>
        <div class="shape"></div>
    </div>

    <div class="card">
        <div class="icon-circle">
            <i class="fas fa-check"></i>
        </div>
        <h3>Password Changed!</h3>
        <p>Your password has been updated successfully. You can now log in with your new credentials.</p>
        
        <a href="/" class="btn">Back to Login</a>
    </div>
</body>
</html>
