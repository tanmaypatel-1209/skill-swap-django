<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify OTP</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">
    <style>
        /* Exact same CSS */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .background { width: 430px; height: 520px; position: absolute; transform: translate(-50%, -50%); left: 50%; top: 50%; }
        .shape { height: 200px; width: 200px; position: absolute; border-radius: 50%; }
        .shape:first-child { background: linear-gradient(#1845ad, #23a2f6); left: -80px; top: -80px; opacity: 0.8; }
        .shape:last-child { background: linear-gradient(to right, #ff512f, #f09819); right: -30px; bottom: -80px; opacity: 0.8; }
        form { height: 450px; width: 400px; background-color: rgba(255, 255, 255, 0.7); position: absolute; transform: translate(-50%, -50%); top: 50%; left: 50%; border-radius: 10px; backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.5); box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1); padding: 50px 35px; }
        form h3 { font-size: 32px; font-weight: 600; text-align: center; margin-bottom: 30px; color: #333; }
        label { display: block; margin-top: 30px; font-size: 16px; font-weight: 500; color: #555; }
        input { display: block; height: 50px; width: 100%; background-color: rgba(0, 0, 0, 0.05); border-radius: 3px; padding: 0 10px; margin-top: 8px; font-size: 14px; font-weight: 300; border: none; outline: none; text-align: center; letter-spacing: 5px; font-size: 20px;}
        button { margin-top: 50px; width: 100%; background: linear-gradient(to right, #23a2f6, #1845ad); color: #ffffff; padding: 15px 0; font-size: 18px; font-weight: 600; border-radius: 5px; cursor: pointer; border: none; }
        .msg { text-align: center; margin-top: 15px; color: green; font-size: 14px; }
    </style>
</head>
<body>
    <div class="background">
        <div class="shape"></div>
        <div class="shape"></div>
    </div>
    <form method="POST">
        {% csrf_token %}
        <h3>Enter OTP</h3>
        
        <label for="otp">Check your email for code</label>
        <input type="number" placeholder="XXXX" name="otp" required>

        {% if messages %}
            {% for message in messages %}
            <p class="msg" style="color: {% if message.tags == 'error' %}red{% else %}green{% endif %};">{{ message }}</p>
            {% endfor %}
        {% endif %}

        <button type="submit">Verify Code</button>
    </form>
</body>
</html>
