<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complete Profile</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        
        body { 
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh;
            overflow: hidden; 
        }

        .background { width: 430px; height: 520px; position: absolute; transform: translate(-50%, -50%); left: 50%; top: 50%; z-index: -1; }
        .shape { height: 200px; width: 200px; position: absolute; border-radius: 50%; }
        .shape:first-child { background: linear-gradient(#1845ad, #23a2f6); left: -100px; top: -100px; opacity: 0.8; }
        .shape:last-child { background: linear-gradient(to right, #ff512f, #f09819); right: -80px; bottom: -100px; opacity: 0.8; }

        form { 
            width: 500px; height: auto; max-height: 90vh; overflow-y: auto;          
            background-color: rgba(255, 255, 255, 0.7); position: absolute; 
            top: 50%; left: 50%; transform: translate(-50%, -50%); 
            border-radius: 10px; backdrop-filter: blur(15px); 
            border: 1px solid rgba(255, 255, 255, 0.5); 
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1); padding: 30px 35px; 
        }

        form::-webkit-scrollbar { width: 6px; }
        form::-webkit-scrollbar-track { background: transparent; }
        form::-webkit-scrollbar-thumb { background: #ccc; border-radius: 10px; }
        form::-webkit-scrollbar-thumb:hover { background: #aaa; }

        form h3 { font-size: 26px; font-weight: 600; text-align: center; margin-bottom: 5px; color: #333; }
        form p { text-align: center; font-size: 13px; color: #666; margin-bottom: 20px; }

        /* Profile Upload Styles */
        .profile-upload { display: flex; justify-content: center; margin-bottom: 20px; }
        .upload-circle {
            width: 100px; height: 100px; border-radius: 50%; background: rgba(255, 255, 255, 0.5);
            border: 2px dashed #23a2f6; display: flex; flex-direction: column; justify-content: center; 
            align-items: center; cursor: pointer; position: relative; overflow: hidden; transition: all 0.3s ease;
        }
        .upload-circle:hover { background: rgba(35, 162, 246, 0.1); border-color: #1845ad; }
        .upload-circle i { font-size: 28px; color: #23a2f6; margin-bottom: 5px; z-index: 2; }
        .upload-circle span { font-size: 9px; color: #555; font-weight: 600; z-index: 2; }
        #previewImg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; display: none; z-index: 1; }
        #fileInput { display: none; }

        label { display: block; margin-top: 12px; font-size: 13px; font-weight: 500; color: #555; }
        
        input[type="text"], select { 
            display: block; height: 40px; width: 100%; background-color: rgba(0, 0, 0, 0.05); 
            border-radius: 3px; padding: 0 10px; margin-top: 5px; font-size: 13px; font-weight: 300; 
            border: none; outline: none; cursor: pointer;
        }
        input[type="text"] { cursor: text; }

        /* Custom Dropdown UI Styles */
        .custom-select-wrapper { position: relative; width: 100%; margin-top: 5px; }
        .custom-select-header {
            display: flex; justify-content: space-between; align-items: center;
            height: 40px; background-color: rgba(0, 0, 0, 0.05); border-radius: 3px; 
            padding: 0 10px; font-size: 13px; font-weight: 300; cursor: pointer; transition: background 0.3s;
        }
        .custom-select-header:hover { background-color: rgba(0, 0, 0, 0.1); }
        .custom-select-body {
            position: absolute; top: 100%; left: 0; right: 0;
            background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(15px);
            border: 1px solid rgba(0,0,0,0.1); border-radius: 5px; margin-top: 5px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.15); max-height: 250px; display: flex; flex-direction: column;
            z-index: 100; opacity: 0; visibility: hidden; transform: translateY(-10px); transition: all 0.3s ease;
        }
        .custom-select-body.active { opacity: 1; visibility: visible; transform: translateY(0); }
        .dropdown-search {
            border: none; border-bottom: 1px solid #eee; padding: 12px 10px; width: 100%;
            font-size: 13px; outline: none; background: transparent; flex-shrink: 0; cursor: text !important;
        }
        .dropdown-list { overflow-y: auto; flex-grow: 1; padding-bottom: 10px; }
        .dropdown-list::-webkit-scrollbar { width: 4px; }
        .dropdown-list::-webkit-scrollbar-thumb { background: #bbb; border-radius: 4px; }
        .optgroup-title {
            font-weight: 600; font-size: 10px; color: #1845ad; padding: 10px 10px 4px; 
            text-transform: uppercase; letter-spacing: 0.5px;
        }
        .custom-option { padding: 8px 15px; font-size: 13px; color: #444; cursor: pointer; transition: 0.2s ease; }
        .custom-option:hover { background: rgba(35, 162, 246, 0.1); color: #1845ad; padding-left: 20px; font-weight: 500; }

        .row { display: flex; gap: 15px; }
        .col { flex: 1; }

        button { 
            margin-top: 25px; width: 100%; background: linear-gradient(to right, #23a2f6, #1845ad); 
            color: #ffffff; padding: 12px 0; font-size: 16px; font-weight: 600; 
            border-radius: 5px; cursor: pointer; border: none; transition: 0.3s;
        }
        button:hover { transform: scale(1.02); }
        
        .messages { margin-bottom: 15px; text-align: center; }
        .msg-error { color: #d9534f; font-size: 13px; font-weight: 500; }
        .msg-success { color: #5cb85c; font-size: 13px; font-weight: 500; }
    </style>
</head>
<body>
    <div class="background">
        <div class="shape"></div>
        <div class="shape"></div>
    </div>

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        <h3>Complete Profile</h3>
        <p>Tell us what you want to learn & teach</p>

        {% if messages %}
            <div class="messages">
                {% for message in messages %}
                    <p class="{% if message.tags == 'error' %}msg-error{% else %}msg-success{% endif %}">
                        {{ message }}
                    </p>
                {% endfor %}
            </div>
        {% endif %}

        <label style="text-align: center; margin-bottom: 8px;">Profile Picture</label>
        
        <div class="profile-upload">
            <div class="upload-circle" onclick="document.getElementById('fileInput').click()">
                <i class="fas fa-camera"></i>
                <span>Upload Photo</span>
                <img id="previewImg" src="" alt="Profile Preview">
            </div>
            <input type="file" id="fileInput" name="profile_pic" accept="image/*" onchange="previewFile()">
        </div>

        <div class="row">
            <div class="col">
                <label>I want to learn</label>
                <div class="custom-select-wrapper" id="wrapper-learn">
                    <input type="hidden" name="want_learn" id="input-learn" required>
                    
                    <div class="custom-select-header" onclick="toggleDropdown('wrapper-learn', event)">
                        <span id="text-learn" style="color:#777;">Select a skill...</span>
                        <i class="fas fa-chevron-down text-gray-400"></i>
                    </div>
                    
                    <div class="custom-select-body">
                        <input type="text" class="dropdown-search" placeholder="Search skills..." onkeyup="filterOptions('wrapper-learn', this.value)">
                        <div class="dropdown-list" id="list-learn">
                            </div>
                    </div>
                </div>
            </div>

            <div class="col">
                <label>I can teach</label>
                <div class="custom-select-wrapper" id="wrapper-teach">
                    <input type="hidden" name="can_teach" id="input-teach" required>
                    
                    <div class="custom-select-header" onclick="toggleDropdown('wrapper-teach', event)">
                        <span id="text-teach" style="color:#777;">Select a skill...</span>
                        <i class="fas fa-chevron-down text-gray-400"></i>
                    </div>
                    
                    <div class="custom-select-body">
                        <input type="text" class="dropdown-search" placeholder="Search skills..." onkeyup="filterOptions('wrapper-teach', this.value)">
                        <div class="dropdown-list" id="list-teach">
                            </div>
                    </div>
                </div>
            </div>
        </div>

        <label>Experience (Optional)</label>
        <input type="text" name="experience" placeholder="e.g. 2 years in Coding">

        <label>City / Location</label>
        <input type="text" name="location" placeholder="e.g. Nadiad" required>

        <div class="row">
            <div class="col">
                <label>Availability</label>
                <select name="availability">
                    <option value="Weekdays">Weekdays</option>
                    <option value="Weekends">Weekends</option>
                    <option value="Anytime">Anytime</option>
                </select>
            </div>
            <div class="col">
                <label>Preferred Mode</label>
                <select name="mode">
                    <option value="Online">Online</option>
                    <option value="Offline">In-Person</option>
                    <option value="Both">Both</option>
                </select>
            </div>
        </div>

        <button type="submit">Save & Go to Dashboard</button>
    </form>

    <script>
        // --- 1. PROFILE PICTURE PREVIEW ---
        function previewFile() {
            const preview = document.getElementById('previewImg');
            const fileInput = document.getElementById('fileInput');
            const file = fileInput.files[0];
            const reader = new FileReader();

            reader.onloadend = function () {
                preview.src = reader.result;
                preview.style.display = "block";
            }

            if (file) {
                reader.readAsDataURL(file);
            } else {
                preview.src = "";
                preview.style.display = "none";
            }
        }

        // --- 2. CUSTOM DROPDOWN LOGIC ---
        const skillCategories = {
            "Academics & Hobbies": ['Chemistry', 'Chess', 'Cooking', 'Fitness Coaching', 'Mathematics', 'Physics', 'Yoga'],
            "Business & Marketing": ['Accounting', 'Copywriting', 'Digital Marketing', 'Entrepreneurship', 'Public Speaking', 'SEO'],
            "Design & Art": ['Animation', 'Graphic Design', 'Illustration', 'Photography', 'UI/UX Design', 'Video Editing'],
            "Languages": ['English', 'French', 'German', 'Japanese', 'Mandarin', 'Spanish'],
            "Music & Audio": ['Audio Engineering', 'Guitar', 'Music Production', 'Piano', 'Singing'],
            "Tech & Programming": ['AI/Machine Learning', 'Data Science', 'JavaScript', 'Mobile App Dev', 'Python', 'Web Development']
        };

        function renderOptions(containerId) {
            const container = document.getElementById(containerId);
            let html = '';
            
            for (const [category, skills] of Object.entries(skillCategories)) {
                html += `<div class="optgroup-title">${category}</div>`;
                skills.forEach(skill => {
                    const wrapperId = containerId === 'list-learn' ? 'wrapper-learn' : 'wrapper-teach';
                    html += `<div class="custom-option" onclick="selectOption('${wrapperId}', '${skill}')">${skill}</div>`;
                });
            }
            container.innerHTML = html;
        }

        renderOptions('list-learn');
        renderOptions('list-teach');

        function toggleDropdown(wrapperId, event) {
            event.stopPropagation(); // Prevent closing immediately
            
            const otherId = wrapperId === 'wrapper-learn' ? 'wrapper-teach' : 'wrapper-learn';
            document.querySelector(`#${otherId} .custom-select-body`).classList.remove('active');
            
            const body = document.querySelector(`#${wrapperId} .custom-select-body`);
            body.classList.toggle('active');

            if(body.classList.contains('active')) {
                // Focus search input when opened
                document.querySelector(`#${wrapperId} .dropdown-search`).focus();
            }
        }

        function selectOption(wrapperId, skillValue) {
            const wrapper = document.getElementById(wrapperId);
            
            const textSpan = wrapperId === 'wrapper-learn' ? document.getElementById('text-learn') : document.getElementById('text-teach');
            textSpan.textContent = skillValue;
            textSpan.style.color = "#333"; 

            const hiddenInput = wrapperId === 'wrapper-learn' ? document.getElementById('input-learn') : document.getElementById('input-teach');
            hiddenInput.value = skillValue;

            wrapper.querySelector('.custom-select-body').classList.remove('active');
            
            const searchInput = wrapper.querySelector('.dropdown-search');
            searchInput.value = '';
            filterOptions(wrapperId, '');
        }

        function filterOptions(wrapperId, searchText) {
            const list = document.getElementById(wrapperId === 'wrapper-learn' ? 'list-learn' : 'list-teach');
            const options = list.querySelectorAll('.custom-option');
            const lowerSearch = searchText.toLowerCase();

            options.forEach(opt => {
                if (opt.textContent.toLowerCase().includes(lowerSearch)) {
                    opt.style.display = "block";
                } else {
                    opt.style.display = "none";
                }
            });
        }

        // Close dropdowns if user clicks anywhere else on the screen
        document.addEventListener('click', function(event) {
            const learnWrapper = document.getElementById('wrapper-learn');
            const teachWrapper = document.getElementById('wrapper-teach');
            
            if (!learnWrapper.contains(event.target)) {
                learnWrapper.querySelector('.custom-select-body').classList.remove('active');
            }
            if (!teachWrapper.contains(event.target)) {
                teachWrapper.querySelector('.custom-select-body').classList.remove('active');
            }
        });
        
        // Form submission validation to ensure a skill was picked
        document.querySelector('form').addEventListener('submit', function(e) {
            const learnInput = document.getElementById('input-learn').value;
            const teachInput = document.getElementById('input-teach').value;
            
            if(!learnInput || !teachInput) {
                e.preventDefault();
                alert("Please select a skill for both what you want to learn and what you can teach.");
            }
        });
    </script>
</body>
</html>
